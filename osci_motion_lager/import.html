<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import - Osci Lager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div class="header-container"><img src="header.png" class="banner-img"></div>
    <nav class="top-nav">
        <a href="index.html" class="nav-link">← Zurück</a>
        <div style="flex:1; text-align:center; color:var(--primary); font-weight:bold; font-size:0.8rem;">DOSIER-IMPORT</div>
    </nav>

    <div class="section-card" style="margin-top:20px;">
        <div class="section-header">📊 Analyse-Daten einfügen</div>
        <div class="section-body" style="padding:20px;">
            <textarea id="importText" placeholder="Kopierte Tabelle oder Stream hier einfügen..." rows="8" style="font-family:monospace; font-size:0.8rem;"></textarea>
            <button class="big-btn btn-blue" style="background:#673AB7; margin-top:15px;" onclick="importer.process()">DATEN VERBUCHEN</button>
        </div>
    </div>
    <div class="footer-container"><img src="footer.png" class="footer-img"></div>
</div>

<div id="importSummaryModal" class="modal-overlay"><div class="modal-content" style="max-width: 450px;"><h3 style="color:var(--success); margin-top:0;">Import erfolgreich</h3><p style="font-size:0.8rem; color:#aaa;">Abgezogen:</p><div id="importSummaryList" style="max-height: 300px; overflow-y: auto; margin: 15px 0; border: 1px solid #333; border-radius: 8px;"></div><button onclick="ui.closeModals()" class="big-btn btn-blue" style="width:100%;">OK</button></div></div>

<script src="config.js"></script><script src="core.js"></script><script src="ui.js"></script><script src="import.js"></script>
<script>window.onload = () => core.init();</script>
</body>
</html>
