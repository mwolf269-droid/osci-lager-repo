<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Changelog - Osci Lager</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0b0b0b; --card: #161616; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; border: 1px solid #2a2a2a; text-align: center; }
        .nav-back { color: var(--primary); text-decoration: none; font-weight: bold; margin-bottom: 20px; display: inline-block; }
        h2 { color: var(--primary); margin-bottom: 20px; }
        .version-box { border-top: 1px solid #333; padding-top: 20px; }
        .version { color: var(--primary); font-weight: bold; font-size: 1.5rem; display: block; }
        .date { color: #888; font-size: 0.9rem; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <a href="index.html" class="nav-back">← Zurück zum Lager</a>
        <h2>🛠️ Changelog</h2>
        <div class="version-box">
            <span class="version">V1.0.0</span>
            <span class="date">27.03.2026</span>
            <p>App Release</p>
        </div>
    </div>
</body>
</html>
