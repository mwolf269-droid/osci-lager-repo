<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Osci-Motion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div class="header-container"><img src="header.png" class="banner-img"></div>
    <nav class="top-nav">
        <a href="index.html" class="nav-link active">📦 Lager</a>
        <a href="stats.html" class="nav-link">📈 Statistik</a>
        <a href="import.html" class="nav-link">📊 Import</a>
        <a href="measuring.html" class="nav-link">⚖️ Wiegen</a>
        <a href="handbuch.html" class="nav-link">📖 Hilfe</a>
        <a href="changelog.html" class="nav-link">🛠️ Logs</a>
    </nav>
    <div id="status" class="status-bar">Verbinde...</div>
    <div id="lagerContainer"></div>
    <div class="footer-container"><img src="footer.png" class="footer-img"></div>
</div>

<!-- MODALS -->
<div id="addModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="addModalTitle" style="color:var(--primary); margin-top:0; margin-bottom: 20px;">Zukauf</h3>
        <div id="addModalOptions"></div>
        <button onclick="ui.closeModals()" style="background:none; border:none; color:#666; text-decoration:underline; cursor:pointer; margin-top:15px;">Abbrechen</button>
    </div>
</div>

<div id="remModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="remModalTitle" style="color:var(--danger); margin-top:0; margin-bottom: 20px;">Entnahme</h3>
        <div style="position:relative; margin-bottom: 10px;">
            <input type="number" id="remInput" style="font-size:2.5rem; text-align:center; padding:15px;" placeholder="0.00">
            <span id="modalUnit" style="position:absolute; bottom: -20px; left:0; width:100%; color:#444; font-size:0.8rem;">ml</span>
        </div>
        <button id="remConfirmBtn" onclick="ui.confirmRem()" class="big-btn btn-red" style="margin-top:25px;">ABZIEHEN</button>
        <button onclick="ui.closeModals()" style="background:none; border:none; color:#666; text-decoration:underline; cursor:pointer; margin-top:15px;">Abbrechen</button>
    </div>
</div>

<script src="config.js"></script><script src="core.js"></script><script src="ui.js"></script>
<script>window.onload = () => { if(typeof core !== 'undefined' && core.init) core.init(); };</script>
</body>
</html>
